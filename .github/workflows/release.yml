name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string
      dry_run:
        description: "Preview without making changes"
        required: false
        type: boolean
        default: false

jobs:
  release:
    if: github.repository == 'EndstoneMC/dwarf2cpp'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          if git tag -l "v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Extract unreleased changelog
        run: |
          BODY=$(sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[/d; p}' CHANGELOG.md)
          BODY=$(echo "$BODY" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$BODY" ]; then
            echo "::error::Unreleased section in CHANGELOG.md is empty"
            exit 1
          fi
          echo "$BODY" > /tmp/release_body.md
          echo "Extracted changelog:"
          echo "$BODY"

      - name: Preview
        if: inputs.dry_run
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "=== Dry Run ==="
          echo "Version: $VERSION"
          echo "Tag: v$VERSION"
          echo "Date: $DATE"
          echo ""
          echo "=== Release Body ==="
          cat /tmp/release_body.md

      - name: Update version in pyproject.toml
        if: ${{ !inputs.dry_run }}
        run: sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Update CHANGELOG.md
        if: ${{ !inputs.dry_run }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md pyproject.toml
          git commit -m "Release $VERSION"
          git tag "v$VERSION"

      - name: Push
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin main
          git push origin "v$VERSION"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
              "${{ github.repository }}" "$PREV_TAG" "$VERSION" >> /tmp/release_body.md
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file /tmp/release_body.md

  build_wheels:
    if: ${{ !inputs.dry_run }}
    needs: [ release ]
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-14 ]
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_SKIP: "*-win32 *-manylinux_i686"

      - name: Attach wheels to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ inputs.version }}" wheelhouse/*.whl
